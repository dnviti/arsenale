---
- name: Template compose file
  template:
    src: compose.yml.j2
    dest: "{{ arsenale_home }}/docker-compose.yml"
    mode: "0640"

- name: Template environment file (non-secret config only)
  template:
    src: env.j2
    dest: "{{ arsenale_home }}/.env"
    mode: "0640"

- name: Build images from source
  command: >
    podman compose -f {{ arsenale_home }}/docker-compose.yml
    build --no-cache
  when: arsenale_build_images | bool
  changed_when: true

- name: Pull pre-built images
  command: >
    podman compose -f {{ arsenale_home }}/docker-compose.yml
    pull
  when: not (arsenale_build_images | bool)
  changed_when: false

- name: Deploy Arsenale stack
  command: >
    podman compose -f {{ arsenale_home }}/docker-compose.yml
    up -d --remove-orphans
  changed_when: true
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ arsenale_uid }}"
