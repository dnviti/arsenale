---
# Unified deploy role — handles both production (podman) and development

- name: Template compose file
  template:
    src: compose.yml.j2
    dest: "{{ _home }}/docker-compose.yml"
    mode: "0640"
  when: _state == 'present'

- name: Template environment file (non-secret config only)
  template:
    src: env.j2
    dest: "{{ _home }}/.env"
    mode: "0640"
  when: _state == 'present'

# --- Build / Pull ---

- name: Set compose command
  set_fact:
    _compose_cmd: "{{ container_runtime | default('podman') }} compose -f {{ _home }}/docker-compose.yml"
    _repo_root: "{{ _home if (_is_dev | default(false) | bool) else (_home + '/arsenale') }}"

- name: Read rendered compose definition from target host
  slurp:
    src: "{{ _home }}/docker-compose.yml"
  register: compose_definition_file
  when: _state == 'present' and _build | bool

- name: Load rendered compose definition
  set_fact:
    compose_definition: "{{ compose_definition_file.content | b64decode | from_yaml }}"
  when: _state == 'present' and _build | bool

- name: Select services with build configuration
  set_fact:
    compose_services_for_build: >-
      {{
        compose_definition.services
        | dict2items
        | selectattr('value.build', 'defined')
        | map(attribute='key')
        | list
      }}
  when: _state == 'present' and _build | bool

- name: Derive parallel build capacity
  set_fact:
    _build_parallelism: "{{ arsenale_build_parallelism | default([compose_services_for_build | length, 4] | min) | int }}"
    _build_total_cpus: "{{ ansible_processor_vcpus | default(ansible_processor_count | default(4)) | int }}"
    _build_memory_mb_total: "{{ ansible_memtotal_mb | int }}"
  when: _state == 'present' and _build | bool and (compose_services_for_build | length > 0)

- name: Derive per-build resource limits
  set_fact:
    _build_stage_jobs: "{{ arsenale_build_stage_jobs | default([(_build_total_cpus // _build_parallelism), 1] | max) | int }}"
    _build_memory_limit: "{{ arsenale_build_memory | default(([(((_build_memory_mb_total * 3) // 4) // _build_parallelism), 2048] | max) | string ~ 'm') }}"
    _build_cpu_quota: "{{ arsenale_build_cpu_quota | default([((_build_total_cpus * 100000) // _build_parallelism), 100000] | max) | int }}"
  when: _state == 'present' and _build | bool and (compose_services_for_build | length > 0)

- name: Define build base images
  set_fact:
    _build_base_images:
      - docker.io/library/node:22-alpine
      - docker.io/library/nginx:1.28-alpine
      - docker.io/library/golang:1.25-alpine
      - docker.io/library/golang:1.23-alpine
      - docker.io/library/alpine:3.18
      - docker.io/library/alpine:3.21
      - docker.io/library/alpine:3.22
  when: _state == 'present' and _build | bool and (compose_services_for_build | length > 0)

- name: Check cached build base images
  command: >
    {{ container_runtime | default('podman') }} image exists {{ item }}
  when: _state == 'present' and _build | bool and (compose_services_for_build | length > 0)
  changed_when: false
  failed_when: false
  loop: "{{ _build_base_images }}"
  loop_control:
    label: "{{ item }}"
  register: build_base_image_checks
  environment: "{{ _compose_env }}"
  vars:
    _compose_env: >-
      {{
        {}
        if (_is_dev | default(false) | bool)
        else {'XDG_RUNTIME_DIR': '/run/user/' + (arsenale_uid | default('1000') | string)}
      }}

- name: Pre-pull missing build base images
  command: >
    {{ container_runtime | default('podman') }} pull {{ item.item }}
  when: _state == 'present' and _build | bool and (compose_services_for_build | length > 0) and item.rc != 0
  changed_when: true
  loop: "{{ build_base_image_checks.results }}"
  loop_control:
    label: "{{ item.item }}"
  register: build_base_pull_result
  retries: 3
  delay: 5
  until: build_base_pull_result.rc == 0
  environment: "{{ _compose_env }}"
  vars:
    _compose_env: >-
      {{
        {}
        if (_is_dev | default(false) | bool)
        else {'XDG_RUNTIME_DIR': '/run/user/' + (arsenale_uid | default('1000') | string)}
      }}

- name: Launch image builds in parallel
  command: >-
    {{ container_runtime | default('podman') }} build
    --jobs {{ _build_stage_jobs }}
    --memory {{ _build_memory_limit }}
    --cpu-period 100000
    --cpu-quota {{ _build_cpu_quota }}
    {% for build_arg in (compose_definition.services[item].build.args | default({}) | dict2items) %}
    --build-arg {{ build_arg.key }}={{ build_arg.value }}
    {% endfor %}
    -f {{
      compose_definition.services[item].build.dockerfile
      if (compose_definition.services[item].build.dockerfile | regex_search('^/'))
      else (compose_definition.services[item].build.context ~ '/' ~ compose_definition.services[item].build.dockerfile)
    }}
    -t {{
      compose_definition.services[item].image
      | default('arsenale_' ~ item)
    }}
    {{ compose_definition.services[item].build.context }}
  when: _state == 'present' and _build | bool and (compose_services_for_build | length > 0)
  changed_when: true
  loop: "{{ compose_services_for_build }}"
  loop_control:
    label: "{{ item }}"
  register: compose_build_jobs
  async: 7200
  poll: 0
  environment: "{{ _compose_env }}"
  vars:
    _compose_env: >-
      {{
        {}
        if (_is_dev | default(false) | bool)
        else {'XDG_RUNTIME_DIR': '/run/user/' + (arsenale_uid | default('1000') | string)}
      }}

- name: Wait for image builds to finish
  async_status:
    jid: "{{ item.ansible_job_id }}"
  when: _state == 'present' and _build | bool and (compose_services_for_build | length > 0)
  changed_when: true
  loop: "{{ compose_build_jobs.results }}"
  loop_control:
    label: "{{ item.item }}"
  register: compose_build_result
  until: compose_build_result.finished
  retries: 720
  delay: 10
  environment: "{{ _compose_env }}"
  vars:
    _compose_env: >-
      {{
        {}
        if (_is_dev | default(false) | bool)
        else {'XDG_RUNTIME_DIR': '/run/user/' + (arsenale_uid | default('1000') | string)}
      }}

- name: Pull pre-built images
  command: >
    {{ _compose_cmd }} pull
  when: _state == 'present' and not (_build | bool)
  changed_when: false

# --- Deploy / Teardown ---

- name: Reset development stack before rebuilding
  command: >
    {{ _compose_cmd }} down --remove-orphans
  when: _state == 'present' and _build | bool and (_is_dev | default(false) | bool)
  changed_when: true
  failed_when: false
  environment: "{{ _compose_env }}"
  vars:
    _compose_env: >-
      {{
        {}
        if (_is_dev | default(false) | bool)
        else {'XDG_RUNTIME_DIR': '/run/user/' + (arsenale_uid | default('1000') | string)}
      }}

- name: Start PostgreSQL for schema bootstrap
  command: >
    {{ _compose_cmd }} up -d postgres
  when: _state == 'present'
  changed_when: true
  environment: "{{ _compose_env }}"
  vars:
    _compose_env: >-
      {{
        {}
        if (_is_dev | default(false) | bool)
        else {'XDG_RUNTIME_DIR': '/run/user/' + (arsenale_uid | default('1000') | string)}
      }}

- name: Run database migrations
  command: >
    {{ _compose_cmd }} run --rm migrate up
  when: _state == 'present'
  register: schema_bootstrap
  changed_when: "'applied_now=0' not in schema_bootstrap.stdout or 'stamped legacy database' in schema_bootstrap.stdout"
  retries: 12
  delay: 5
  until: schema_bootstrap.rc == 0
  environment:
    XDG_RUNTIME_DIR: "{{ omit if (_is_dev | default(false) | bool) else '/run/user/' + (arsenale_uid | default('1000') | string) }}"

- name: Deploy Arsenale stack
  command: >
    {{ _compose_cmd }} up -d --remove-orphans
  when: _state == 'present'
  changed_when: true
  environment: "{{ _compose_env }}"
  vars:
    _compose_env: >-
      {{
        {}
        if (_is_dev | default(false) | bool)
        else {'XDG_RUNTIME_DIR': '/run/user/' + (arsenale_uid | default('1000') | string)}
      }}

- name: Tear down Arsenale stack
  command: >
    {{ _compose_cmd }} down --remove-orphans
  when: _state == 'absent'
  changed_when: true
  environment: "{{ _compose_env }}"
  vars:
    _compose_env: >-
      {{
        {}
        if (_is_dev | default(false) | bool)
        else {'XDG_RUNTIME_DIR': '/run/user/' + (arsenale_uid | default('1000') | string)}
      }}
