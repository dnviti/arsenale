# Ansible Vault — Arsenale Secrets
# Encrypt with: ansible-vault encrypt inventory/group_vars/all/vault.yml
# Or generate fresh secrets: ansible-playbook playbooks/setup-vault.yml

# Required secrets (auto-generated by setup-vault.yml)
vault_jwt_secret: "CHANGE_ME"
vault_guacamole_secret: "CHANGE_ME"
vault_server_encryption_key: "CHANGE_ME"
vault_postgres_password: "CHANGE_ME"
vault_guacenc_auth_token: "CHANGE_ME"

# Constructed from components (auto-generated)
vault_database_url: "postgresql://{{ arsenale_db_user }}:{{ vault_postgres_password }}@postgres:5432/{{ arsenale_db_name }}?sslmode=require"

# Optional secrets (fill in as needed, leave empty if unused)
vault_smtp_pass: ""
vault_sendgrid_api_key: ""
vault_ses_secret_access_key: ""
vault_resend_api_key: ""
vault_mailgun_api_key: ""
vault_twilio_auth_token: ""
vault_sns_secret_access_key: ""
vault_vonage_api_secret: ""
vault_google_client_secret: ""
vault_microsoft_client_secret: ""
vault_github_client_secret: ""
vault_oidc_client_secret: ""
vault_ldap_bind_password: ""
vault_ai_api_key: ""
