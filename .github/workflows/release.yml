name: Release

on:
  push:
    branches:
      - develop
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build CLI binaries ──────────────────────────────────────────
  build-cli:
    name: Build CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache-dependency-path: |
            go.work
            go.work.sum
            tools/arsenale-cli/go.mod
            tools/arsenale-cli/go.sum

      - name: Extract version
        id: version
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
            archive_version="$version"
          else
            short_sha="$(git rev-parse --short=12 HEAD)"
            version="develop-${short_sha}"
            archive_version="develop"
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'archive_version=%s\n' "$archive_version" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-s -w -X github.com/dnviti/arsenale/tools/arsenale-cli/cmd.Version=${{ steps.version.outputs.version }}" \
            -o dist/arsenale${{ matrix.ext }} \
            ./tools/arsenale-cli/

      - name: Package archive
        run: |
          cd dist
          ARCHIVE="arsenale-cli_${{ steps.version.outputs.archive_version }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${ARCHIVE}.zip" arsenale${{ matrix.ext }}
          else
            tar czf "${ARCHIVE}.tar.gz" arsenale${{ matrix.ext }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arsenale-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/arsenale-cli_*
          if-no-files-found: error

  # ── Build platform installer bundle ─────────────────────────────
  build-installer:
    name: Build platform installer bundle
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            archive_version="${GITHUB_REF_NAME#v}"
          else
            archive_version="develop"
          fi
          printf 'archive_version=%s\n' "$archive_version" >> "$GITHUB_OUTPUT"

      - name: Package installer bundle
        run: |
          set -euo pipefail
          mkdir -p dist
          tar czf "dist/arsenale-installer_${{ steps.version.outputs.archive_version }}.tar.gz" \
            --exclude='SECRETS.env' \
            --exclude='.vault-pass' \
            --exclude='inventory/group_vars/all/vault.yml' \
            --exclude='tests' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            deployment/ansible

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arsenale-installer
          path: dist/arsenale-installer_*
          if-no-files-found: error

  # ── Generate checksums ──────────────────────────────────────────
  checksums:
    name: Generate checksums
    needs: [build-cli, build-installer]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: arsenale-cli-*
          merge-multiple: true
          path: dist

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: arsenale-installer
          path: dist

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum arsenale-cli_* arsenale-installer_* > checksums_sha256.txt

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/checksums_sha256.txt

  # ── Create GitHub Release ──────────────────────────────────────
  release:
    name: Create GitHub Release
    if: ${{ github.ref == 'refs/heads/develop' || (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-staging')) }}
    needs: [build-cli, build-installer, checksums]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: release_meta
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            prerelease=false
            if [[ "$GITHUB_REF_NAME" == *-beta* ]]; then
              prerelease=true
            fi
            {
              printf 'tag_name=%s\n' "$GITHUB_REF_NAME"
              printf 'name=%s\n' "$GITHUB_REF_NAME"
              printf 'draft=true\n'
              printf 'prerelease=%s\n' "$prerelease"
              printf 'generate_release_notes=true\n'
              printf 'make_latest=legacy\n'
              printf 'body<<EOF\nEOF\n'
            } >> "$GITHUB_OUTPUT"
          else
            {
              printf 'tag_name=cli-dev\n'
              printf 'name=CLI development build\n'
              printf 'draft=false\n'
              printf 'prerelease=true\n'
              printf 'generate_release_notes=false\n'
              printf 'make_latest=false\n'
              printf 'body<<EOF\n'
              printf 'Latest CLI build from `develop` at commit `%s`.\n' "$GITHUB_SHA"
              printf '\nArchive names are stable so download links always resolve to the newest dev CLI build.\n'
              printf 'EOF\n'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Move development release tag
        if: ${{ github.ref == 'refs/heads/develop' }}
        run: |
          set -euo pipefail
          git tag --force "${{ steps.release_meta.outputs.tag_name }}" "$GITHUB_SHA"
          git push --force origin "refs/tags/${{ steps.release_meta.outputs.tag_name }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: arsenale-cli-*
          merge-multiple: true
          path: dist

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: arsenale-installer
          path: dist

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          draft: ${{ steps.release_meta.outputs.draft }}
          generate_release_notes: ${{ steps.release_meta.outputs.generate_release_notes }}
          name: ${{ steps.release_meta.outputs.name }}
          body: ${{ steps.release_meta.outputs.body }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          make_latest: ${{ steps.release_meta.outputs.make_latest }}
          overwrite_files: true
          files: |
            dist/arsenale-cli_*
            dist/arsenale-installer_*
            dist/checksums_sha256.txt
