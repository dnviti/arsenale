# =============================================================================
# Arsenale — Development Podman Compose (Ansible-managed)
# =============================================================================
# Generated by Ansible — do not edit manually.
# Environment: development
# Secrets are managed via Podman secrets (mounted at /run/secrets/).
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: arsenale-postgres
    read_only: true
    cpus: "1.0"
    mem_limit: "1g"
    pids_limit: 256
    tmpfs:
      - /tmp
      - /run/postgresql
    environment:
      POSTGRES_USER: "arsenale"
      POSTGRES_DB: "arsenale"
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../infrastructure/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/postgres:/certs:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../infrastructure/postgres/entrypoint.sh:/usr/local/bin/arsenale-postgres-entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/arsenale-postgres-entrypoint.sh"]
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arsenale -d arsenale"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - net-db

  # ---------------------------------------------------------------------------
  # Apache Guacamole Daemon (guacd) — RDP/VNC protocol handler
  # ---------------------------------------------------------------------------
  guacd:
    image: guacamole/guacd:1.6.0
    container_name: arsenale-guacd
    read_only: true
    cpus: "1.0"
    mem_limit: "512m"
    pids_limit: 256
    tmpfs:
      - /tmp
    environment:
      GUACD_SSL: "true"
      GUACD_SSL_CERT: /certs/server-cert.pem
      GUACD_SSL_KEY: /certs/server-key.pem
    volumes:
      - arsenale_drive:/guacd-drive
      - arsenale_recordings:/recordings
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/guacd:/certs:ro
    restart: always
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "netstat -tln | grep -q ':4822 ' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - net-guacd

  # ---------------------------------------------------------------------------
  # Guacenc — Session recording video converter
  # ---------------------------------------------------------------------------
  guacenc:
    build:
      context: /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../gateways/guacenc
      dockerfile: Dockerfile
    container_name: arsenale-guacenc
    read_only: true
    cpus: "1.0"
    mem_limit: "768m"
    pids_limit: 256
    tmpfs:
      - /tmp
    environment:
      GUACENC_AUTH_TOKEN_FILE: /run/secrets/guacenc_auth_token
      CACHE_PUBSUB_URL: "gocache-pubsub:6380"
      CACHE_PUBSUB_TLS_CA: /certs/gocache-pubsub/ca.pem
      CACHE_PUBSUB_TLS_CERT: /certs/gocache-pubsub/client-cert.pem
      CACHE_PUBSUB_TLS_KEY: /certs/gocache-pubsub/client-key.pem
      GUACENC_TLS_CERT: /certs/guacenc/server-cert.pem
      GUACENC_TLS_KEY: /certs/guacenc/server-key.pem
    secrets:
      - guacenc_auth_token
    volumes:
      - arsenale_recordings:/recordings
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs:/certs:ro
    depends_on:
      gocache-pubsub:
        condition: service_healthy
    restart: always
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --show-error --fail --cacert /certs/ca.pem https://localhost:3003/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - net-guacenc
      - net-cache

  # ---------------------------------------------------------------------------
  # GoCache Cache — KV / TTL / locks / queues
  # ---------------------------------------------------------------------------
  gocache-cache:
    build:
      context: /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../infrastructure/gocache
      dockerfile: Dockerfile
    container_name: arsenale-gocache-cache
    read_only: true
    cpus: "1.0"
    mem_limit: "512m"
    pids_limit: 256
    tmpfs:
      - /tmp
    environment:
      CACHE_ROLE: "cache"
      SPIFFE_TRUST_DOMAIN: "arsenale.local"
      CACHE_LISTEN: "tcp://0.0.0.0:6380"
      CACHE_HEALTH_ADDR: "0.0.0.0:6381"
      CACHE_DISCOVERY: "dns"
      CACHE_DNS_NAME: "gocache-cache"
      CACHE_PEER_SPIFFE_ID: "spiffe://arsenale.local/service/gocache-cache"
      CACHE_CLIENT_SPIFFE_ID: "spiffe://arsenale.local/service/server"
      CACHE_TLS_CA: /certs/ca.pem
      CACHE_TLS_CERT: /certs/server-cert.pem
      CACHE_TLS_KEY: /certs/server-key.pem
    volumes:
      - gocache_cache_data:/data
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/gocache-cache:/certs:ro
    restart: always
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --show-error --fail --cacert /certs/ca.pem https://localhost:6381/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - net-cache

  # ---------------------------------------------------------------------------
  # GoCache PubSub — central service-to-service data wiring
  # ---------------------------------------------------------------------------
  gocache-pubsub:
    build:
      context: /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../infrastructure/gocache
      dockerfile: Dockerfile
    container_name: arsenale-gocache-pubsub
    read_only: true
    cpus: "1.0"
    mem_limit: "512m"
    pids_limit: 256
    tmpfs:
      - /tmp
    environment:
      CACHE_ROLE: "pubsub"
      SPIFFE_TRUST_DOMAIN: "arsenale.local"
      CACHE_LISTEN: "tcp://0.0.0.0:6380"
      CACHE_HEALTH_ADDR: "0.0.0.0:6381"
      CACHE_DISCOVERY: "dns"
      CACHE_DNS_NAME: "gocache-pubsub"
      CACHE_PEER_SPIFFE_ID: "spiffe://arsenale.local/service/gocache-pubsub"
      CACHE_CLIENT_SPIFFE_ID: "spiffe://arsenale.local/service/server"
      CACHE_TLS_CA: /certs/ca.pem
      CACHE_TLS_CERT: /certs/server-cert.pem
      CACHE_TLS_KEY: /certs/server-key.pem
    restart: always
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --show-error --fail --cacert /certs/ca.pem https://localhost:6381/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/gocache-pubsub:/certs:ro
    networks:
      - net-cache

  # ---------------------------------------------------------------------------
  # Server — Express.js API + WebSocket backend
  # ---------------------------------------------------------------------------
  server:
    build:
      context: /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: server/Dockerfile
    container_name: arsenale-server
    read_only: true
    cpus: "2.0"
    mem_limit: "1536m"
    pids_limit: 512
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    secrets:
      - jwt_secret
      - guacamole_secret
      - server_encryption_key
      - database_url
      - guacenc_auth_token
      - smtp_pass
      - sendgrid_api_key
      - ses_secret_access_key
      - resend_api_key
      - mailgun_api_key
      - twilio_auth_token
      - sns_secret_access_key
      - vonage_api_secret
      - google_client_secret
      - microsoft_client_secret
      - github_client_secret
      - oidc_client_secret
      - ldap_bind_password
      - ai_api_key
    environment:
      NODE_ENV: "development"
      SPIFFE_TRUST_DOMAIN: "arsenale.local"
      NODE_EXTRA_CA_CERTS: /certs/ca.pem
      CLI_ENABLED: "true"
      DEV_TUNNEL_CERT_DIR: "/certs"
      LOG_LEVEL: "info"
      LOG_HTTP_REQUESTS: "false"
      LOG_GUACAMOLE: "false"
      PORT: "3001"
      GUACAMOLE_WS_PORT: "3002"
      DATABASE_URL: ""
      CLIENT_URL: "https://localhost:3000"
      TRUST_PROXY: "1"
      COOKIE_SECURE: "true"
      GUACD_HOST: guacd
      GUACD_PORT: "4822"
      GUACD_SSL: "true"
      GUACD_CA_CERT: /certs/ca.pem
      GUACENC_SERVICE_URL: "https://guacenc:3003"
      GUACENC_USE_TLS: "true"
      GUACENC_TLS_CA: /certs/guacenc/ca.pem
      CACHE_SIDECAR_ENABLED: "true"
      CACHE_KV_URL: "gocache-cache:6380"
      CACHE_KV_TLS_CA: /certs/gocache-cache/ca.pem
      CACHE_KV_TLS_CERT: /certs/gocache-cache/client-cert.pem
      CACHE_KV_TLS_KEY: /certs/gocache-cache/client-key.pem
      CACHE_PUBSUB_URL: "gocache-pubsub:6380"
      CACHE_PUBSUB_TLS_CA: /certs/gocache-pubsub/ca.pem
      CACHE_PUBSUB_TLS_CERT: /certs/gocache-pubsub/client-cert.pem
      CACHE_PUBSUB_TLS_KEY: /certs/gocache-pubsub/client-key.pem
      SERVER_TLS_CERT: /certs/server/server-cert.pem
      SERVER_TLS_KEY: /certs/server/server-key.pem
      TUNNEL_SERVER_CERT: /certs/server/server-cert.pem
      TUNNEL_SERVER_KEY: /certs/server/server-key.pem
      TUNNEL_SERVER_CA: /certs/ca.pem
      TUNNEL_STRICT_MTLS: "true"
      RECORDING_ENABLED: "false"
      RECORDING_PATH: /recordings
      ALLOW_LOCAL_NETWORK: "false"
      SELF_SIGNUP_ENABLED: "false"
      EMAIL_PROVIDER: "smtp"
      GATEWAY_GRPC_TLS_CA: /certs/ca.pem
      GATEWAY_GRPC_TLS_CERT: /certs/ssh-gateway/client-cert.pem
      GATEWAY_GRPC_TLS_KEY: /certs/ssh-gateway/client-key.pem
    volumes:
      - arsenale_drive:/guacd-drive
      - arsenale_recordings:/recordings
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/ca.pem:/certs/ca.pem:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/ca-key.pem:/certs/ca-key.pem:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/tunnel-managed-ssh:/certs/tunnel-managed-ssh:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/tunnel-guacd:/certs/tunnel-guacd:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/tunnel-db-proxy:/certs/tunnel-db-proxy:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/server:/certs/server:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/gocache-cache:/certs/gocache-cache:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/gocache-pubsub:/certs/gocache-pubsub:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/guacenc:/certs/guacenc:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/ssh-gateway:/certs/ssh-gateway:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const fs=require('fs');const http=require('http');const https=require('https');const useTls=Boolean(process.env.SERVER_TLS_CERT&&process.env.SERVER_TLS_KEY);const request=useTls?https:http;const options=useTls?{hostname:'localhost',port:3001,path:'/api/health',ca:fs.readFileSync('/certs/ca.pem')}:{hostname:'localhost',port:3001,path:'/api/health'};request.get(options,res=>{res.resume();process.exit(res.statusCode===200?0:1);}).on('error',()=>process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      guacd:
        condition: service_healthy
      gocache-cache:
        condition: service_healthy
      gocache-pubsub:
        condition: service_healthy
    restart: always
    networks:
      - net-db
      - net-guacd
      - net-guacenc
      - net-cache
      - net-edge
      - net-gateway

  # ---------------------------------------------------------------------------
  # Client — React SPA served by Nginx
  # ---------------------------------------------------------------------------
  client:
    build:
      context: /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: client/Dockerfile
    container_name: arsenale-client
    read_only: true
    cpus: "0.75"
    mem_limit: "256m"
    pids_limit: 256
    tmpfs:
      - /tmp
      - /run
      - /var/cache/nginx
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/client:/certs:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../client/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    entrypoint: ["nginx", "-g", "daemon off;"]
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --show-error --fail --cacert /certs/ca.pem https://localhost:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      server:
        condition: service_healthy
    restart: always
    networks:
      - net-edge

  # ---------------------------------------------------------------------------
  # SSH Gateway — Managed SSH tunnel for TCP port forwarding
  # ---------------------------------------------------------------------------
  ssh-gateway:
    build:
      context: /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: gateways/ssh-gateway/Dockerfile
    container_name: arsenale-ssh-gateway
    read_only: true
    cpus: "0.5"
    mem_limit: "256m"
    pids_limit: 128
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      SPIFFE_TRUST_DOMAIN: "arsenale.local"
      GATEWAY_API_TLS_CERT: /certs/server-cert.pem
      GATEWAY_API_TLS_KEY: /certs/server-key.pem
      GATEWAY_GRPC_TLS_CA: /certs/ca.pem
      GATEWAY_GRPC_CLIENT_CA: /certs/client-ca.pem
      GATEWAY_GRPC_TLS_CERT: /certs/server-cert.pem
      GATEWAY_GRPC_TLS_KEY: /certs/server-key.pem
      GATEWAY_GRPC_EXPECTED_SPIFFE_ID: "spiffe://arsenale.local/service/server"
    volumes:
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../config/ssh-gateway/authorized_keys:/config/authorized_keys:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/ssh-gateway:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2222 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
    networks:
      - net-gateway


  # ---------------------------------------------------------------------------
  # Development tunnel gateways — end-to-end tunnel registration fixtures
  # ---------------------------------------------------------------------------
  dev-tunnel-ssh-gateway:
    build:
      context: /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: gateways/ssh-gateway/Dockerfile
    container_name: arsenale-dev-tunnel-ssh-gateway
    read_only: true
    cpus: "0.5"
    mem_limit: "256m"
    pids_limit: 128
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      SPIFFE_TRUST_DOMAIN: "arsenale.local"
      TUNNEL_SERVER_URL: "wss://server:3011/api/tunnel/connect"
      TUNNEL_TOKEN: "${DEV_TUNNEL_MANAGED_SSH_TOKEN}"
      TUNNEL_GATEWAY_ID: "${DEV_TUNNEL_MANAGED_SSH_GATEWAY_ID}"
      TUNNEL_LOCAL_PORT: "2222"
      TUNNEL_CA_CERT_FILE: /tunnel-certs/ca.pem
      TUNNEL_CLIENT_CERT_FILE: /tunnel-certs/client-cert.pem
      TUNNEL_CLIENT_KEY_FILE: /tunnel-certs/client-key.pem
      GATEWAY_GRPC_TLS_CA: /certs/ca.pem
      GATEWAY_GRPC_CLIENT_CA: /certs/client-ca.pem
      GATEWAY_GRPC_TLS_CERT: /certs/server-cert.pem
      GATEWAY_GRPC_TLS_KEY: /certs/server-key.pem
      GATEWAY_GRPC_EXPECTED_SPIFFE_ID: "spiffe://arsenale.local/service/server"
    volumes:
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../config/ssh-gateway/authorized_keys:/config/authorized_keys:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/ssh-gateway:/certs:ro
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/tunnel-managed-ssh:/tunnel-certs:ro
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2222 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
    networks:
      - net-gateway

  dev-tunnel-guacd:
    build:
      context: /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: gateways/guacd/Dockerfile
    container_name: arsenale-dev-tunnel-guacd
    read_only: true
    cpus: "1.0"
    mem_limit: "512m"
    pids_limit: 256
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      TUNNEL_SERVER_URL: "wss://server:3011/api/tunnel/connect"
      TUNNEL_TOKEN: "${DEV_TUNNEL_GUACD_TOKEN}"
      TUNNEL_GATEWAY_ID: "${DEV_TUNNEL_GUACD_GATEWAY_ID}"
      TUNNEL_LOCAL_PORT: "4822"
      TUNNEL_CA_CERT_FILE: /tunnel-certs/ca.pem
      TUNNEL_CLIENT_CERT_FILE: /tunnel-certs/client-cert.pem
      TUNNEL_CLIENT_KEY_FILE: /tunnel-certs/client-key.pem
    volumes:
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/tunnel-guacd:/tunnel-certs:ro
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('net');const socket=net.connect({host:'127.0.0.1',port:4822});socket.on('connect',()=>{socket.end();process.exit(0);});socket.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always
    networks:
      - net-gateway

  dev-tunnel-db-proxy:
    build:
      context: /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: gateways/db-proxy/Dockerfile
    container_name: arsenale-dev-tunnel-db-proxy
    read_only: true
    cpus: "0.5"
    mem_limit: "256m"
    pids_limit: 128
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      DB_LISTEN_PORT: "5432"
      TUNNEL_SERVER_URL: "wss://server:3011/api/tunnel/connect"
      TUNNEL_TOKEN: "${DEV_TUNNEL_DB_PROXY_TOKEN}"
      TUNNEL_GATEWAY_ID: "${DEV_TUNNEL_DB_PROXY_GATEWAY_ID}"
      TUNNEL_LOCAL_PORT: "5432"
      TUNNEL_CA_CERT_FILE: /tunnel-certs/ca.pem
      TUNNEL_CLIENT_CERT_FILE: /tunnel-certs/client-cert.pem
      TUNNEL_CLIENT_KEY_FILE: /tunnel-certs/client-key.pem
    volumes:
      - /home/daniele/Documents/Repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/tunnel-db-proxy:/tunnel-certs:ro
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('net');const socket=net.connect({host:'127.0.0.1',port:5432});socket.on('connect',()=>{socket.end();process.exit(0);});socket.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);\""]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
    networks:
      - net-gateway


# =============================================================================
# Secrets — Podman external secrets (created by Ansible podman_secrets role)
# =============================================================================
secrets:
  jwt_secret:
    external: true
  guacamole_secret:
    external: true
  server_encryption_key:
    external: true
  database_url:
    external: true
  postgres_password:
    external: true
  guacenc_auth_token:
    external: true
  smtp_pass:
    external: true
  sendgrid_api_key:
    external: true
  ses_secret_access_key:
    external: true
  resend_api_key:
    external: true
  mailgun_api_key:
    external: true
  twilio_auth_token:
    external: true
  sns_secret_access_key:
    external: true
  vonage_api_secret:
    external: true
  google_client_secret:
    external: true
  microsoft_client_secret:
    external: true
  github_client_secret:
    external: true
  oidc_client_secret:
    external: true
  ldap_bind_password:
    external: true
  ai_api_key:
    external: true

# =============================================================================
# Volumes — Persistent data storage
